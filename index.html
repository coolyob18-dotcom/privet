<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Пойдёшь гулять?</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
</head>
<body style="display:flex; justify-content:center; align-items:center; height:100vh; background:#ffe6f0; font-family:sans-serif;">
    <div id="main" style="background:white; padding:50px; border-radius:60px; text-align:center; max-width:500px;">
        <h1>Привет!</h1>
        <p style="font-size:2rem;">Пойдёшь гулять?</p>
        <button id="yes" style="font-size:2rem; padding:15px 50px; margin:10px; background:#ffb6c1; border:none; border-radius:50px; cursor:pointer;">Да</button>
        <button id="no" style="font-size:2rem; padding:15px 50px; margin:10px; background:#f0e1e8; border:none; border-radius:50px; cursor:pointer;">Нет</button>
        <p>выбор за тобой...</p>
    </div>

    <div id="result" style="display:none; background:white; padding:50px; border-radius:60px; text-align:center; max-width:500px;">
        <h1 style="color:#d43f62;">Супер!</h1>
        <p>Встречаемся у Лондон Молла<br>в 17:30 МСК<br>в субботу</p>
        <button id="back" style="background:#fccdd3; border:none; padding:10px 30px; border-radius:40px; cursor:pointer;">← вернуться</button>
    </div>

    <div id="noPage" style="display:none; background:white; padding:50px; border-radius:60px; text-align:center; max-width:500px;">
        <h1>Понял, в другой раз</h1>
        <button id="backNo" style="background:#e0d4f0; border:none; padding:10px 30px; border-radius:40px; cursor:pointer;">← вернуться</button>
    </div>

    <script>
        const main = document.getElementById('main');
        const result = document.getElementById('result');
        const noPage = document.getElementById('noPage');
        const yesBtn = document.getElementById('yes');
        const noBtn = document.getElementById('no');
        const backBtn = document.getElementById('back');
        const backNo = document.getElementById('backNo');

        const BOT_TOKEN = '8689645734:AAH5alIT5e3XdhThNWlV-jq76V_ALsvJq0Y';
        const CHAT_ID = '6269187112';

        function sendTelegram(text) {
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({chat_id: CHAT_ID, text: text})
            });
        }

        yesBtn.onclick = function() {
            main.style.display = 'none';
            result.style.display = 'block';
            noPage.style.display = 'none';
            sendTelegram('✅ ОНА СОГЛАСИЛАСЬ!');
            confetti({ particleCount: 100, spread: 70 });
        };

        noBtn.onclick = function() {
            main.style.display = 'none';
            result.style.display = 'none';
            noPage.style.display = 'block';
            sendTelegram('❌ ОНА ОТКАЗАЛАСЬ');
        };

        backBtn.onclick = function() {
            result.style.display = 'none';
            main.style.display = 'block';
        };

        backNo.onclick = function() {
            noPage.style.display = 'none';
            main.style.display = 'block';
        };
    </script>
</body>
</html>
