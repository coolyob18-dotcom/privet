<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пойдёшь гулять?</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #ffe6f0 0%, #ffe0ec 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            padding: 20px;
        }
        .invite-card {
            background: #fff9fc;
            box-shadow: 0 30px 50px rgba(230, 100, 130, 0.25);
            border-radius: 60px;
            padding: 50px 40px 55px;
            max-width: 550px;
            width: 100%;
            text-align: center;
            border: 2px solid rgba(255, 200, 210, 0.8);
        }
        .invite-card.hidden { display: none; }
        h1 { font-size: 3rem; color: #c44b6c; margin-bottom: 15px; }
        .question {
            font-size: 2rem;
            color: #4a2c3a;
            margin: 20px 0 35px;
            background: #ffeef4;
            display: inline-block;
            padding: 12px 35px;
            border-radius: 100px;
        }
        .buttons-area {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 35px;
            margin: 25px 0 20px;
        }
        .btn {
            border: none;
            font-weight: 700;
            font-size: 2rem;
            padding: 18px 45px;
            border-radius: 120px;
            cursor: pointer;
            box-shadow: 0 10px 18px rgba(0,0,0,0.12);
            user-select: none;
        }
        .btn-yes { background: #ffb6c1; color: #4d1f2f; border: 3px solid #ff8da1; }
        .btn-yes:active { background: #ff99b0; transform: scale(0.95); }
        .btn-no { background: #f0e1e8; color: #5a3e4b; border: 3px solid #d6b7c2; }
        .btn-no:active { background: #e5d0d9; transform: scale(0.95); }
        .result-page, .no-page {
            display: none;
            border-radius: 70px;
            padding: 45px 30px;
            box-shadow: 0 40px 60px rgba(200, 80, 110, 0.4);
            text-align: center;
            max-width: 550px;
            width: 100%;
            animation: fadePop 0.5s ease;
        }
        .result-page { background: #fff9fc; border: 2px solid #ffbfcc; }
        .no-page { background: #f5f0ff; border: 2px solid #d4c5f0; box-shadow: 0 40px 60px rgba(130, 100, 180, 0.3); }
        .result-page.active, .no-page.active { display: block; }
        @keyframes fadePop {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }
        .super-text { font-size: 4rem; color: #d43f62; margin-bottom: 20px; }
        .no-text { font-size: 2.5rem; color: #6b5b7b; line-height: 1.4; }
        .meeting-details {
            font-size: 2rem;
            background: #fff;
            padding: 25px 30px;
            border-radius: 50px;
            margin: 15px 0 25px;
            color: #2d1e24;
            border: 2px dashed #faa9ba;
        }
        .meeting-details span {
            display: block;
            font-size: 1.8rem;
            background: #ffeef2;
            border-radius: 30px;
            padding: 8px 15px;
            margin-top: 8px;
            color: #b33b54;
        }
        .back-btn, .back-btn-no {
            margin-top: 30px;
            border: none;
            font-size: 1.3rem;
            padding: 12px 30px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .back-btn { background: #fccdd3; color: #5d2e3c; }
        .back-btn-no { background: #e0d4f0; color: #4a3d5c; }
        @media (max-width: 550px) {
            .invite-card { padding: 35px 20px 40px; }
            h1 { font-size: 2.5rem; }
            .question { font-size: 1.6rem; }
            .btn { font-size: 1.8rem; padding: 15px 35px; }
            .buttons-area { gap: 20px; }
            .meeting-details { font-size: 1.6rem; }
            .super-text { font-size: 3rem; }
            .no-text { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div id="inviteCard" class="invite-card">
        <h1>Привет!</h1>
        <div class="question">Пойдёшь гулять?</div>
        <div class="buttons-area">
            <button id="yesButton" class="btn btn-yes">Да</button>
            <button id="noButton" class="btn btn-no">Нет</button>
        </div>
    </div>

    <div id="resultPage" class="result-page">
        <div class="super-text">Супер!</div>
        <div class="meeting-details">
            Встречаемся у Лондон Молла<br>
            <span>в 17:30 МСК</span>
            <span>в субботу</span>
        </div>
        <button id="backBtnYes" class="back-btn">← вернуться</button>
    </div>

    <div id="noPage" class="no-page">
        <div class="no-text">Понял, в другой раз.<br>Если захочешь — я открыт</div>
        <button id="backBtnNo" class="back-btn-no">← вернуться</button>
    </div>

    <script>
        // ========== НАСТРОЙКИ БОТА ==========
        const BOT_TOKEN = '8689645734:ТВОЙ_ТОКЕН';
        const YOUR_CHAT_ID = '6269187112';
        // ====================================

        async function notifyTelegram(answer) {
            const messages = {
                'yes': '🎉 Да! Она согласилась гулять!',
                'no': '😔 Нет... Она отказалась.'
            };
            
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: YOUR_CHAT_ID,
                        text: messages[answer]
                    })
                });
            } catch(e) {
                console.log('Не удалось отправить в Telegram');
            }
        }

        const inviteCard = document.getElementById('inviteCard');
        const resultPage = document.getElementById('resultPage');
        const noPage = document.getElementById('noPage');
        
        document.getElementById('yesButton').addEventListener('click', () => {
            inviteCard.classList.add('hidden');
            resultPage.classList.add('active');
            notifyTelegram('yes');
            confetti({ particleCount: 150, spread: 80, origin: { y: 0.5, x: 0.5 } });
        });
        
        document.getElementById('noButton').addEventListener('click', () => {
            inviteCard.classList.add('hidden');
            noPage.classList.add('active');
            notifyTelegram('no');
        });
        
        document.getElementById('backBtnYes').addEventListener('click', () => {
            resultPage.classList.remove('active');
            inviteCard.classList.remove('hidden');
        });
        
        document.getElementById('backBtnNo').addEventListener('click', () => {
            noPage.classList.remove('active');
            inviteCard.classList.remove('hidden');
        });
    </script>
</body>
</html>
