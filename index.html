<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пойдёшь гулять?</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #ffe6f0, #ffe0ec);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            padding: 20px;
        }
        .card {
            background: #fff9fc;
            border-radius: 60px;
            padding: 50px 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 30px 50px rgba(230,100,130,0.25);
            border: 2px solid rgba(255,200,210,0.8);
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }
        .card.hidden { display: none; }
        h1 { font-size: 3rem; color: #c44b6c; font-family: 'Segoe UI', 'Arial', sans-serif; }
        .question {
            font-size: 2rem;
            background: #ffeef4;
            display: inline-block;
            padding: 12px 35px;
            border-radius: 100px;
            margin: 20px 0 35px;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }
        .buttons { display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; }
        .btn {
            font-size: 2rem;
            font-weight: 700;
            padding: 18px 45px;
            border: none;
            border-radius: 120px;
            cursor: pointer;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }
        .btn-yes { background: #ffb6c1; border: 3px solid #ff8da1; color: #4d1f2f; }
        .btn-no { background: #f0e1e8; border: 3px solid #d6b7c2; color: #5a3e4b; }
        .btn:active { transform: scale(0.95); }
        .big-text {
            font-size: 3rem;
            color: #d43f62;
            margin-bottom: 15px;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            font-weight: 800;
        }
        .no-text {
            font-size: 2rem;
            color: #6b5b7b;
            line-height: 1.5;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            font-weight: 600;
        }
        .details {
            background: white;
            padding: 25px;
            border-radius: 50px;
            font-size: 1.8rem;
            border: 2px dashed #faa9ba;
            margin: 15px 0;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            font-weight: 600;
        }
        .details span {
            display: block;
            background: #ffeef2;
            border-radius: 30px;
            padding: 8px;
            margin-top: 8px;
            color: #b33b54;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }
        .back-btn {
            margin-top: 25px;
            padding: 12px 30px;
            font-size: 1.2rem;
            border-radius: 40px;
            border: none;
            background: #fccdd3;
            cursor: pointer;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            font-weight: bold;
            color: #5d2e3c;
        }
        .status {
            font-size: 0.9rem;
            color: #999;
            margin-top: 15px;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }
        .result { animation: pop 0.5s ease; }
        @keyframes pop {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="mainCard" class="card">
        <h1>Привет!</h1>
        <div class="question">Пойдёшь гулять?</div>
        <div class="buttons">
            <button class="btn btn-yes" onclick="answer('yes')">Да</button>
            <button class="btn btn-no" onclick="answer('no')">Нет</button>
        </div>
        <div id="status" class="status"></div>
    </div>

    <div id="yesResult" class="result" style="display:none;">
        <div class="card">
            <div class="big-text">Супер!</div>
            <div class="details">
                Встречаемся у Лондон Молла<br>
                <span>в 17:30 МСК</span>
                <span>в субботу</span>
            </div>
            <button class="back-btn" onclick="goBack()">← вернуться</button>
        </div>
    </div>

    <div id="noResult" class="result" style="display:none;">
        <div class="card" style="background:#f5f0ff; border-color:#d4c5f0;">
            <div class="no-text">
                Понял, в другой раз.<br>Если захочешь — я открыт
            </div>
            <button class="back-btn" style="background:#e0d4f0; color:#4a3d5c;" onclick="goBack()">← вернуться</button>
        </div>
    </div>

    <script>
        const SERVER_URL = 'https://script.google.com/macros/s/AKfycbxLAvM6pXXQjHj3dwzrCK2BuFGoBAS_GYKgJiIwD0qyfWJ7cFLzDjdBPPJfZs6NYG3e/exec';

        function answer(choice) {
            document.getElementById('mainCard').classList.add('hidden');
            
            if (choice === 'yes') {
                document.getElementById('yesResult').style.display = 'block';
                confetti({ particleCount: 150, spread: 80, origin: { y: 0.5, x: 0.5 } });
            } else {
                document.getElementById('noResult').style.display = 'block';
            }
            
            sendToServer(choice);
        }

        function sendToServer(choice) {
            fetch(SERVER_URL, {
                method: 'POST',
                body: JSON.stringify({ answer: choice })
            });
        }

        function goBack() {
            document.getElementById('mainCard').classList.remove('hidden');
            document.getElementById('yesResult').style.display = 'none';
            document.getElementById('noResult').style.display = 'none';
            document.getElementById('status').textContent = '';
        }
    </script>

</body>
</html>
